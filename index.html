        const infoPanel = document.getElementById('info-panel');

        function positionPanel(mouseX, mouseY) {
            if (window.innerWidth <= 600) return;
            const pw = infoPanel.offsetWidth || 285;
            const ph = infoPanel.offsetHeight || 200;
            let left = mouseX + 15;
            if (left + pw > window.innerWidth - 15) left = mouseX - pw - 15;
            let top = mouseY - 20;
            if (top + ph > window.innerHeight - 15) top = window.innerHeight - ph - 15;
            infoPanel.style.left = left + 'px';
            infoPanel.style.top = top + 'px';
        }

        function buildPanelHtml(p) {
            const buildRow = (name, score, val, color) => `
                <div class="panel-cand-row">
                    <div class="panel-cand-dot" style="background:${color}"></div>
                    <div class="panel-cand-info"><div class="panel-cand-name">${name}</div></div>
                    <div class="panel-cand-score">${score}</div>
                </div>
                <div class="panel-bar-wrap"><div class="panel-bar" style="width:${val}%;background:${color}"></div></div>`;

            return `
                <div class="panel-box">
                    <div class="panel-bv-code">Bureau de vote n°${p.code}</div>
                    <div class="panel-bv-name">${p.name}</div>
                    <span class="panel-cat">${p.cat}</span>
                    
                    <div class="t2-header">Premier Tour</div>
                    ${buildRow('Pierre HURMIC', p.hurmic_t1, p.hurmic_t1_val, '#27ae60')}
                    ${buildRow('Nordine RAYMOND', p.raymond_t1, p.raymond_t1_val, '#e67e22')}
                    ${buildRow('Philippe POUTOU', p.poutou_t1, p.poutou_t1_val, '#c0392b')}
                    
                    <div class="t2-header">Second Tour</div>
                    ${buildRow('Gauche Hurmic', p.score_t2, p.score_t2_val, '#2ecc71')}
                </div>`;
        }

        function onEachFeature(feature, layer) {
            layer.setStyle({
                fillColor: feature.properties.color, weight: 1, opacity: 1, color: '#fff', fillOpacity: 0.7
            });

            layer.on({
                mouseover: function(e) {
                    this.setStyle({ weight: 2, color: '#333', fillOpacity: 0.9 });
                    this.bringToFront();
                    infoPanel.innerHTML = buildPanelHtml(feature.properties);
                    infoPanel.style.display = 'block';
                    positionPanel(e.originalEvent.clientX, e.originalEvent.clientY);
                },
                mousemove: function(e) {
                    positionPanel(e.originalEvent.clientX, e.originalEvent.clientY);
                },
                mouseout: function() {
                    geojsonLayer.resetStyle(this);
                    infoPanel.style.display = 'none';
                },
                click: function(e) {
                    if (window.innerWidth <= 600) {
                        infoPanel.innerHTML = buildPanelHtml(feature.properties);
                        infoPanel.style.display = 'block';
                    }
                }
            });
        }

        const geojsonLayer = L.geoJSON(data, { onEachFeature: onEachFeature }).addTo(map);
        if (geojsonLayer.getBounds().isValid()) map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });
        
        // Fermer le panneau au clic sur la carte (mobile)
        map.on('click', () => { if (window.innerWidth <= 600) infoPanel.style.display = 'none'; });
    </script>
