<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Démobilisation Bastions de Gauche</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f9f9f9; padding: 20px; }
        .chart-container { height: 500px; width: 100%; max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; }
        h2 { text-align: center; font-size: 18px; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="chart-container">
        <h2>Bastions démobilisés : comparaison des voix de gauche entre les deux tours</h2>
        <canvas id="demobilisationChart"></canvas>
    </div>
    <script>
        const ctx = document.getElementById('demobilisationChart').getContext('2d');
        const data = [
            { b: 'Menuts 2', t1: 36, t2: 131 },
            { b: 'Meunier 1', t1: 36, t2: 139 },
            { b: 'Meunier 3', t1: 46, t2: 161 }
        ];
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.map(d => d.b),
                datasets: [
                    { label: 'Potentiel Gauche (T1)', data: data.map(d => d.t1), backgroundColor: '#E0E0E0' },
                    { label: 'Hurmic (T2)', data: data.map(d => d.t2), backgroundColor: '#FF69B4' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    </script>
</body>
</html>
