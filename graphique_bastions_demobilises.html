<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bastions démobilisés - Bordeaux 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f9f9f9; padding: 20px; }
        .chart-container { position: relative; height: 500px; width: 100%; max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; font-size: 19px; color: #333; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="chart-container">
        <h2>Bastions démobilisés : comparaison des voix de gauche entre les deux tours</h2>
        <canvas id="demobilisationChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('demobilisationChart').getContext('2d');
        
        const data = [
            { bureau: 'Menuts 2', quartier: 'Saint-Michel / Victoire', t1: 511, t2: 500, manquantes: 11, report: '97.8%', part1: '53.26%', part2: '53.26%' },
            { bureau: 'André Meunier 1', quartier: 'Saint-Michel / Victoire', t1: 444, t2: 428, manquantes: 16, report: '96.4%', part1: '46.72%', part2: '46.72%' },
            { bureau: 'André Meunier 3', quartier: 'Saint-Michel / Victoire', t1: 460, t2: 423, manquantes: 37, report: '92.0%', part1: '47.47%', part2: '47.47%' }
        ];

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.map(d => d.bureau),
                datasets: [
                    {
                        label: 'Potentiel Gauche (1er Tour)',
                        data: data.map(d => d.t1),
                        backgroundColor: '#E0E0E0', // Gris clair
                        borderRadius: 4
                    },
                    {
                        label: 'Score Hurmic (2nd Tour)',
                        data: data.map(d => d.t2),
                        backgroundColor: '#FF69B4', // Rose
                        borderRadius: 4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom' },
                    tooltip: {
                        backgroundColor: 'white',
                        titleColor: '#111',
                        bodyColor: '#444',
                        borderColor: '#ddd',
                        borderWidth: 1,
                        padding: 15,
                        displayColors: false,
                        callbacks: {
                            title: (context) => data[context[0].dataIndex].bureau,
                            label: (context) => {
                                const d = data[context.dataIndex];
                                return [
                                    'Quartier : ' + d.quartier,
                                    '-----------------------',
                                    'Voix T1 (Potentiel) : ' + d.t1,
                                    'Voix T2 (Réel) : ' + d.t2,
                                    'Voix manquantes : ' + d.manquantes,
                                    '-----------------------',
                                    'Taux de report : ' + d.report,
                                    'Participation T1 : ' + d.part1,
                                    'Participation T2 : ' + d.part2
                                ];
                            }
                        }
                    }
                },
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: 'Nombre de voix' } }
                }
            }
        });
    </script>
</body>
</html>
