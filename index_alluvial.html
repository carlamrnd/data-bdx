
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Flux Électoral Alluvial - Bordeaux</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 20px; background: #fff; }
        .container { max-width: 1000px; margin: auto; height: 600px; padding: 10px; }
        h2 { text-align: left; color: #111; font-size: 26px; margin-bottom: 5px; letter-spacing: -0.5px; }
        p { text-align: left; color: #666; font-size: 15px; margin-bottom: 30px; }
        .legend-custom { display: flex; gap: 25px; font-size: 13px; margin-bottom: 15px; font-weight: 700; text-transform: uppercase; }
        .leg-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 16px; height: 16px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Trajectoire des voix (2020 - 2026)</h2>
        <p>L'épaisseur de chaque flux illustre le volume de voix obtenu. Les blocs restent segmentés par famille politique.</p>
        
        <div class="legend-custom">
            <div class="leg-item"><div class="dot" style="background:#d62828"></div> Extrême Gauche</div>
            <div class="leg-item"><div class="dot" style="background:#f72585"></div> Gauche</div>
            <div class="leg-item"><div class="dot" style="background:#f8961e"></div> Autres</div>
            <div class="leg-item" style="color:#9ca3af; font-weight:normal;">—— Participation (%)</div>
        </div>

        <canvas id="alluvialChart"></canvas>
    </div>

    <script>
        const rawData = {"labels": ["Municipales 2020 T1", "Municipales 2020 T2", "Pr\u00e9sidentielle 2022 T1", "L\u00e9gislatives 2022 T1", "L\u00e9gislatives 2022 T2", "L\u00e9gislatives 2024 T1", "L\u00e9gislatives 2024 T2", "Municipales 2026 T1", "Municipales 2026 T2"], "ext_gauche": [295, 227, 1328, 30, 0, 26, 0, 804, 0], "gauche": [472, 616, 258, 1136, 1193, 1648, 1699, 611, 1351], "autre": [294, 190, 726, 411, 328, 561, 474, 481, 431], "participation": ["35", "35", "71", "48", "47", "66", "64", "52", "49"]};
        
        const ctx = document.getElementById('alluvialChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: rawData.labels,
                datasets: [
                    {
                        label: 'Autres',
                        data: rawData.autre,
                        backgroundColor: '#f8961e',
                        borderColor: 'transparent',
                        fill: true,
                        tension: 0.5, // Courbes alluviales fluides
                        pointRadius: 0,
                        stack: 'combined'
                    },
                    {
                        label: 'Gauche',
                        data: rawData.gauche,
                        backgroundColor: '#f72585',
                        borderColor: 'transparent',
                        fill: true,
                        tension: 0.5,
                        pointRadius: 0,
                        stack: 'combined'
                    },
                    {
                        label: 'Extrême Gauche',
                        data: rawData.ext_gauche,
                        backgroundColor: '#d62828',
                        borderColor: 'transparent',
                        fill: true,
                        tension: 0.5,
                        pointRadius: 0,
                        stack: 'combined'
                    },
                    {
                        label: 'Participation (%)',
                        data: rawData.participation,
                        borderColor: '#9ca3af',
                        borderWidth: 2,
                        borderDash: [4, 4],
                        fill: false,
                        yAxisID: 'y1',
                        pointRadius: 4,
                        pointBackgroundColor: '#fff',
                        tension: 0.3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(17, 24, 39, 0.95)',
                        titleFont: { size: 14, weight: 'bold' },
                        padding: 12,
                        bodySpacing: 8,
                        callbacks: {
                            label: function(context) {
                                if (context.datasetIndex === 3) return "PARTICIPATION : " + context.parsed.y + "%";
                                return context.dataset.label.toUpperCase() + " : " + context.raw + " voix";
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        stacked: true,
                        beginAtZero: true,
                        grid: { color: '#f3f4f6' },
                        title: { display: true, text: 'VOIX CUMULÉES', font: { weight: 'bold' } }
                    },
                    y1: {
                        position: 'right',
                        max: 100,
                        grid: { display: false },
                        title: { display: true, text: 'PARTICIPATION %', font: { weight: 'bold' } }
                    },
                    x: {
                        grid: { 
                            color: 'rgba(0,0,0,0.05)', 
                            lineWidth: 3 // Segmentation verticale marquée
                        },
                        ticks: { font: { weight: 'bold', size: 10 } }
                    }
                }
            }
        });
    </script>
</body>
</html>
