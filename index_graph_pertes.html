
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Top 15 Pertes - Bordeaux</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: white; padding: 20px; }
        .chart-container { height: 600px; width: 100%; max-width: 850px; margin: auto; }
        h2 { text-align: center; font-size: 18px; color: #333; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="chart-container">
        <h2>Top 15 : Bureaux où la gauche a perdu le plus de voix au 2nd tour</h2>
        <canvas id="top15Chart"></canvas>
    </div>
    <script>
        const ctx = document.getElementById('top15Chart').getContext('2d');
        const d = [{"b": "Andr\u00e9 Meunier 3", "perte": 37.0, "t1": 460, "t2": 423, "rep": "72,43 %"}, {"b": "Albert Schweitzer 3", "perte": 35.0, "t1": 173, "t2": 138, "rep": "47,75 %"}, {"b": "Somme 5", "perte": 32.0, "t1": 399, "t2": 367, "rep": "63,06 %"}, {"b": "Albert Schweitzer 1", "perte": 30.0, "t1": 235, "t2": 205, "rep": "49,04 %"}, {"b": "Albert Schweitzer 2", "perte": 26.0, "t1": 257, "t2": 231, "rep": "48,02 %"}, {"b": "Louise Michel 1", "perte": 22.0, "t1": 148, "t2": 126, "rep": "63,32 %"}, {"b": "Son Tay 1", "perte": 20.0, "t1": 288, "t2": 268, "rep": "60,09 %"}, {"b": "Menuts 1", "perte": 17.0, "t1": 497, "t2": 480, "rep": "75,35 %"}, {"b": "Andr\u00e9 Meunier 2", "perte": 17.0, "t1": 586, "t2": 569, "rep": "71,93 %"}, {"b": "Andr\u00e9 Meunier 1", "perte": 16.0, "t1": 444, "t2": 428, "rep": "75,49 %"}, {"b": "Vieux Bordeaux 2", "perte": 15.0, "t1": 285, "t2": 270, "rep": "58,57 %"}, {"b": "Vieux Bordeaux 1", "perte": 14.0, "t1": 287, "t2": 273, "rep": "52,10 %"}, {"b": "Andr\u00e9 Meunier 5", "perte": 13.0, "t1": 198, "t2": 185, "rep": "70,88 %"}, {"b": "Condorcet 2", "perte": 12.0, "t1": 196, "t2": 184, "rep": "41,82 %"}, {"b": "Vaclav Havel 1", "perte": 12.0, "t1": 267, "t2": 255, "rep": "49,80 %"}];
        
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: d.map(x => x.b),
                datasets: [{
                    label: 'Voix perdues',
                    data: d.map(x => x.perte),
                    backgroundColor: '#FF0000',
                    borderRadius: 4,
                    barThickness: 22
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'white',
                        titleColor: '#333',
                        bodyColor: '#555',
                        borderColor: '#ccc',
                        borderWidth: 1,
                        padding: 15,
                        displayColors: false,
                        callbacks: {
                            label: function(ctx) {
                                const i = ctx.dataIndex;
                                return [
                                    'Voix perdues : ' + d[i].perte,
                                    'Potentiel Gauche T1 (BJ) : ' + d[i].t1,
                                    'Score Hurmic T2 (BL) : ' + d[i].t2,
                                    'Taux de report : ' + d[i].rep
                                ];
                            }
                        }
                    }
                },
                scales: {
                    x: { 
                        grid: { display: true, color: '#f0f0f0' }, 
                        title: { display: true, text: 'Nombre de voix perdues' } 
                    },
                    y: { 
                        grid: { display: false }, 
                        ticks: { font: { weight: 'bold' } } 
                    }
                }
            }
        });
    </script>
</body>
</html>
