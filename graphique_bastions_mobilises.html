<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobilisation Bastions de Gauche - Bordeaux 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f9f9f9; padding: 20px; }
        .chart-container { position: relative; height: 500px; width: 100%; max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; font-size: 19px; color: #333; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="chart-container">
        <h2>Bastions mobilisés : comparaison des voix de gauche entre les deux tours</h2>
        <canvas id="mobilisationChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('mobilisationChart').getContext('2d');
        
        const data = [
            { bureau: 'Paul Bert 1', quartier: 'Hôtel de Ville / Paul Bert', t1: 441, t2: 467, supp: 26, report: '105.9%', part1: '52.96%', part2: '52.96%' },
            { bureau: 'Paul Bert 3', quartier: 'Hôtel de Ville / Paul Bert', t1: 423, t2: 435, supp: 12, report: '102.8%', part1: '55.64%', part2: '55.64%' },
            { bureau: 'Menuts 3', quartier: 'Saint-Michel', t1: 492, t2: 504, supp: 12, report: '102.4%', part1: '54.56%', part2: '54.56%' }
        ];

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.map(d => d.bureau),
                datasets: [
                    {
                        label: 'Potentiel Gauche (1er Tour)',
                        data: data.map(d => d.t1),
                        backgroundColor: '#E0E0E0', // Gris clair
                        borderColor: '#BDBDBD',
                        borderWidth: 1,
                        borderRadius: 4
                    },
                    {
                        label: 'Score Hurmic (2nd Tour)',
                        data: data.map(d => d.t2),
                        backgroundColor: '#FFA500', // Orange
                        borderColor: '#FF8C00',
                        borderWidth: 1,
                        borderRadius: 4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 15, padding: 20 } },
                    tooltip: {
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        titleColor: '#111',
                        bodyColor: '#444',
                        borderColor: '#ddd',
                        borderWidth: 1,
                        padding: 15,
                        displayColors: false,
                        callbacks: {
                            title: (context) => data[context[0].dataIndex].bureau,
                            label: (context) => {
                                const d = data[context.dataIndex];
                                return [
                                    'Quartier : ' + d.quartier,
                                    '-----------------------',
                                    'Voix T1 (Potentiel) : ' + d.t1,
                                    'Voix T2 (Réel) : ' + d.t2,
                                    'Voix gagnées : +' + d.supp,
                                    '-----------------------',
                                    'Taux de report : ' + d.report,
                                    'Participation T1 : ' + d.part1,
                                    'Participation T2 : ' + d.part2
                                ];
                            }
                        }
                    }
                },
                scales: {
                    y: { 
                        beginAtZero: true, 
                        grid: { color: '#f0f0f0' },
                        title: { display: true, text: 'Nombre de voix' }
                    },
                    x: { grid: { display: false } }
                },
                animation: { duration: 1500, easing: 'easeOutQuart' }
            }
        });
    </script>
</body>
</html>
