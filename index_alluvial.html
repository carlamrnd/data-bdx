
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Flux Électoral Bordeaux - 2020-2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; background: #fff; }
        .container { max-width: 1100px; margin: auto; height: 600px; padding: 10px; position: relative; }
        h2 { text-align: left; color: #111; font-size: 24px; margin-bottom: 5px; }
        p { text-align: left; color: #666; font-size: 14px; margin-bottom: 40px; }
        
        /* Étiquettes personnalisées pour l'axe Y */
        .y-labels {
            position: absolute;
            left: -10px;
            top: 100px;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-weight: bold;
            font-size: 12px;
            color: #444;
            pointer-events: none;
            z-index: 10;
        }
        .y-label { background: rgba(255,255,255,0.8); padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Trajectoire des voix et dynamique des blocs</h2>
        <p>L'épaisseur de chaque flux représente le volume de voix. La participation est indiquée sous chaque scrutin.</p>
        
        <div class="y-labels">
            <div class="y-label" style="color: #d62828;">EXTRÊME GAUCHE</div>
            <div class="y-label" style="color: #f72585;">GAUCHE</div>
            <div class="y-label" style="color: #f8961e;">AUTRES</div>
        </div>

        <canvas id="alluvialChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('alluvialChart').getContext('2d');
        
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: [["Municipales 2020 T1", "Part. 35%"], ["Municipales 2020 T2", "Part. 35%"], ["Pr\u00e9sidentielle 2022 T1", "Part. 71%"], ["L\u00e9gislatives 2022 T1", "Part. 48%"], ["L\u00e9gislatives 2022 T2", "Part. 47%"], ["L\u00e9gislatives 2024 T1", "Part. 66%"], ["L\u00e9gislatives 2024 T2", "Part. 64%"], ["Municipales 2026 T1", "Part. 52%"], ["Municipales 2026 T2", "Part. 49%"]],
                datasets: [
                    {
                        label: 'Autres',
                        data: [294, 190, 726, 411, 328, 561, 474, 481, 431],
                        backgroundColor: '#f8961e',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        stack: 'combined'
                    },
                    {
                        label: 'Gauche',
                        data: [472, 616, 258, 1136, 1193, 1648, 1699, 611, 1351],
                        backgroundColor: '#f72585',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        stack: 'combined'
                    },
                    {
                        label: 'Extrême Gauche',
                        data: [295, 227, 1328, 30, 0, 26, 0, 804, 0],
                        backgroundColor: '#d62828',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        stack: 'combined'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        backgroundColor: 'rgba(0,0,0,0.9)',
                        padding: 12,
                        callbacks: {
                            label: (ctx) => ctx.dataset.label + " : " + ctx.raw + " voix"
                        }
                    }
                },
                scales: {
                    y: {
                        stacked: true,
                        beginAtZero: true,
                        ticks: { display: false }, // On cache les chiffres
                        grid: { color: '#f9f9f9' }
                    },
                    x: {
                        grid: { 
                            color: 'rgba(0,0,0,0.05)', 
                            lineWidth: 2 
                        },
                        ticks: { 
                            font: { size: 10, weight: 'bold' },
                            padding: 10
                        }
                    }
                },
                layout: {
                    padding: { left: 80, right: 20 }
                }
            }
        });
    </script>
</body>
</html>
