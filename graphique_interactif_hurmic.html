
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyse Électorale - Bordeaux</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 40px auto; max-width: 900px; }
        #chart-container { background: white; padding: 30px; border: 1px solid #eee; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h2 { margin: 0; font-size: 22px; color: #1a1a1a; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="chart-container">
        <h2>Potentiel Gauche (T1) vs Réel Hurmic (T2)</h2>
        <div id="chart"></div>
    </div>

    <script>
        const labels = ["Menuts 2", "Andr\u00e9 Meunier 3", "Andr\u00e9 Meunier 1"];
        const data_t1 = [511, 460, 444];
        const data_t2 = [500, 423, 428];
        const custom = [["Menuts 2", "Bordeaux Sud (St Michel)", 11, "97,85%"], ["Andr\u00e9 Meunier 3", "Bordeaux Sud (St Michel)", 37, "91,96%"], ["Andr\u00e9 Meunier 1", "Bordeaux Sud (St Michel)", 16, "96,40%"]];

        const trace1 = {
            x: labels,
            y: data_t1,
            name: 'Potentiel Gauche (T1)',
            type: 'bar',
            marker: { color: '#E0E0E0' },
            customdata: custom,
            hovertemplate: 
                '<b>%{customdata[0]}</b><br>' +
                'Potentiel T1 : %{y} voix<br>' +
                'Voix perdues : %{customdata[2]}<br>' +
                'Taux de report : %{customdata[3]}<br>' +
                '<extra></extra>'
        };

        const trace2 = {
            x: labels,
            y: data_t2,
            name: 'Réel Hurmic (T2)',
            type: 'bar',
            marker: { color: '#FF69B4' },
            customdata: custom,
            hovertemplate: 
                '<b>%{customdata[0]}</b><br>' +
                'Réel Hurmic T2 : %{y} voix<br>' +
                'Voix perdues : %{customdata[2]}<br>' +
                'Taux de report : %{customdata[3]}<br>' +
                '<extra></extra>'
        };

        const layout = {
            barmode: 'group',
            xaxis: { tickangle: -45, automargin: true },
            yaxis: { title: 'Nombre de voix', gridcolor: '#f5f5f5' },
            margin: { t: 20, b: 100, l: 60, r: 20 },
            legend: { orientation: 'h', y: -0.3, x: 0.5, xanchor: 'center' },
            hovermode: 'closest',
            template: 'plotly_white'
        };

        Plotly.newPlot('chart', [trace1, trace2], layout, { responsive: true, displayModeBar: false });
    </script>
</body>
</html>
