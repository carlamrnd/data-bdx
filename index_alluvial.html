
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Flux des votes - Bordeaux 2020-2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; padding: 20px; background: #fff; }
        .container { max-width: 1000px; margin: auto; height: 550px; padding: 20px; }
        h2 { text-align: left; color: #111; font-size: 24px; margin-bottom: 5px; }
        p { text-align: left; color: #666; font-size: 14px; margin-bottom: 30px; }
        .legend-custom { display: flex; gap: 20px; font-size: 13px; margin-bottom: 10px; font-weight: 600; }
        .leg-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 14px; height: 14px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Flux électoral : Évolution des blocs (2020-2026)</h2>
        <p>L'épaisseur des courbes représente le nombre de voix. Les blocs restent superposés par famille politique.</p>
        
        <div class="legend-custom">
            <div class="leg-item"><div class="dot" style="background:#e63946"></div> Extrême Gauche</div>
            <div class="leg-item"><div class="dot" style="background:#ff69b4"></div> Gauche</div>
            <div class="leg-item"><div class="dot" style="background:#f97316"></div> Autres</div>
            <div class="leg-item"><div class="dot" style="background:#9ca3af; border: 1px dashed #666;"></div> Participation (%)</div>
        </div>

        <canvas id="alluvialChart"></canvas>
    </div>

    <script>
        const rawData = {"labels": ["Municipales 2020 T1", "Municipales 2020 T2", "Pr\u00e9sidentielle 2022 T1", "L\u00e9gislatives 2022 T1", "L\u00e9gislatives 2022 T2", "L\u00e9gislatives 2024 T1", "L\u00e9gislatives 2024 T2", "Municipales 2026 T1", "Municipales 2026 T2"], "ext_gauche": [295, 227, 1328, 30, 0, 26, 0, 804, 0], "gauche": [472, 616, 258, 1136, 1193, 1648, 1699, 611, 1351], "autre": [294, 190, 726, 411, 328, 561, 474, 481, 431], "participation": ["35", "35", "71", "48", "47", "66", "64", "52", "49"]};
        
        const ctx = document.getElementById('alluvialChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: rawData.labels,
                datasets: [
                    {
                        label: 'Autres',
                        data: rawData.autre,
                        borderColor: 'transparent',
                        backgroundColor: '#f97316',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        stack: 'combined'
                    },
                    {
                        label: 'Gauche',
                        data: rawData.gauche,
                        borderColor: 'transparent',
                        backgroundColor: '#ff69b4',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        stack: 'combined'
                    },
                    {
                        label: 'Extrême Gauche',
                        data: rawData.ext_gauche,
                        borderColor: 'transparent',
                        backgroundColor: '#e63946',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        stack: 'combined'
                    },
                    {
                        label: 'Participation (%)',
                        data: rawData.participation,
                        borderColor: '#9ca3af',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        fill: false,
                        tension: 0.3,
                        yAxisID: 'y1',
                        pointRadius: 5,
                        pointBackgroundColor: '#fff'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        backgroundColor: 'rgba(0, 0, 0, 0.9)',
                        padding: 12,
                        callbacks: {
                            label: function(context) {
                                if (context.datasetIndex === 3) return "Participation : " + context.parsed.y + "%";
                                return context.dataset.label + " : " + context.raw + " voix";
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        stacked: true,
                        beginAtZero: true,
                        title: { display: true, text: 'Volume total des voix' },
                        grid: { color: '#f0f0f0' }
                    },
                    y1: {
                        position: 'right',
                        beginAtZero: true,
                        max: 100,
                        title: { display: true, text: 'Participation (%)' },
                        grid: { display: false }
                    },
                    x: {
                        grid: { 
                            color: '#e0e0e0', // Marqueurs visuels verticaux
                            lineWidth: 1
                        },
                        ticks: { font: { size: 10, weight: 'bold' } }
                    }
                }
            }
        });
    </script>
</body>
</html>
