
<!DOCTYPE html>
<html>
<head>
    <title>Top 15 Pertes - Bordeaux</title>
    <meta charset="utf-8" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: white; padding: 20px; }
        .chart-container { height: 600px; width: 100%; max-width: 850px; margin: auto; }
        h2 { text-align: center; font-size: 18px; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="chart-container">
        <h2>Top 15 : Bureaux où la gauche a perdu le plus de voix au 2nd tour</h2>
        <canvas id="pertesChart"></canvas>
    </div>
    <script>
        const ctx = document.getElementById('pertesChart').getContext('2d');
        const d = [];
        
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: d.map(x => x.b),
                datasets: [{
                    label: 'Perte de voix',
                    data: d.map(x => x.perte),
                    backgroundColor: '#FF0000',
                    borderRadius: 3
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { 
                        min: -45, 
                        max: 0,
                        ticks: { stepSize: 5 },
                        title: { display: true, text: 'Nombre de voix manquantes' }
                    },
                    y: { 
                        position: 'right', // Met les noms à droite pour qu'ils soient lisibles
                        ticks: { font: { weight: 'bold' } }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                const i = ctx.dataIndex;
                                return [
                                    'Voix manquantes : ' + d[i].perte,
                                    'Potentiel T1 : ' + d[i].t1,
                                    'Hurmic T2 : ' + d[i].t2,
                                    'Taux de report : ' + d[i].rep
                                ];
                            }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
