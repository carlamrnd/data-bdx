
<!DOCTYPE html>
<html>
<head>
    <title>Évolution Hurmic T1 vs T2</title>
    <meta charset="utf-8" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: white; padding: 10px; margin: 0; }
        .chart-container { position: relative; height: 500px; width: 100%; }
        h2 { text-align: center; font-size: 16px; color: #111; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>Progression de Pierre Hurmic dans les 20 Bastions de Gauche</h2>
    <div class="chart-container">
        <canvas id="hurmicChart"></canvas>
    </div>
    <script>
        const ctx = document.getElementById('hurmicChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["VIEUX 1", "VIEUX 3", "PAUL BERT 1", "PAUL BERT 3", "MENUTS 1", "MENUTS 2", "MENUTS 3", "MENUTS 4", "LOUISE MICHEL", "MEUNIER 1", "MEUNIER 2", "MEUNIER 3", "MEUNIER 4", "MEUNIER 5", "SON TAY 2", "SON TAY 4", "NUIT 1", "SUZANNE MARTIN 1", "BENAUGE 1", "BENAUGE 2"],
                datasets: [
                    {
                        label: 'Hurmic (1er Tour)',
                        data: [26.38, 27.59, 34.21, 29.35, 30.72, 31.48, 34.89, 33.9, 20.72, 32.16, 38.01, 26.27, 32.45, 28.38, 25.99, 27.8, 37.11, 39.25, 42.1, 33.8],
                        backgroundColor: '#FF0000',
                        borderRadius: 4
                    },
                    {
                        label: 'Hurmic (2nd Tour)',
                        data: [52.1, 58.75, 66.24, 64.35, 75.35, 79.24, 77.42, 79.94, 63.32, 75.49, 71.93, 72.43, 75.6, 70.88, 60.42, 60.09, 62.22, 63.26, 63.24, 61.19],
                        backgroundColor: '#FF69B4',
                        borderRadius: 4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        beginAtZero: true,
                        max: 100,
                        title: { display: true, text: 'Score (%)' }
                    },
                    x: {
                        ticks: { font: { size: 10 }, maxRotation: 45, minRotation: 45 }
                    }
                },
                plugins: {
                    legend: { position: 'bottom' },
                    tooltip: { mode: 'index', intersect: false }
                }
            }
        });
    </script>
</body>
</html>
