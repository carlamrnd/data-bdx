<!DOCTYPE html>
<html>
<head>
    <title>Comparatif Scores T1 vs T2 - Bastions de Gauche</title>
    <meta charset="utf-8" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: white; padding: 20px; }
        .chart-container { position: relative; height: 400px; width: 100%; max-width: 800px; margin: auto; }
        h2 { text-align: center; font-size: 18px; color: #333; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h2>Évolution du vote de gauche entre les deux tours</h2>
    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>
    <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Paul Bert 1', 'Paul Bert 3', 'Menuts 3', 'Menuts 2', 'Meunier 1', 'Meunier 3'],
                datasets: [{
                    label: 'Gauche (1er Tour)',
                    data: [56.92, 56.97, 68.88, 72.68, 68.51, 65.59],
                    backgroundColor: 'rgba(255, 0, 0, 0.5)',
                    borderColor: 'rgba(255, 0, 0, 1)',
                    borderWidth: 1
                },
                {
                    label: 'Hurmic (2nd Tour)',
                    data: [66.24, 64.35, 77.42, 79.24, 75.49, 72.43],
                    backgroundColor: 'rgba(255, 105, 180, 0.7)',
                    borderColor: 'rgba(255, 105, 180, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: false,
                        min: 40,
                        title: { display: true, text: 'Score en %' }
                    }
                },
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    </script>
</body>
</html>
